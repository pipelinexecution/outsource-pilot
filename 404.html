<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — OutsourcePilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a1f44;
      color: #b0c4e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: #ffffff;
      text-decoration: none;
      margin-bottom: 52px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #1a6aff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 20px; height: 20px; fill: white; }

    .error-code {
      font-family: 'Sora', sans-serif;
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 700;
      color: #1a6aff;
      line-height: 1;
      opacity: 0.3;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 14px;
    }

    p {
      font-size: 0.95rem;
      color: #8aa8d4;
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-block;
      background: #1a6aff;
      color: #ffffff;
      padding: 12px 28px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: #1245a8; }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7l9 5 9-5-9-5zM3 12l9 5 9-5M3 17l9 5 9-5"/></svg>
    </div>
    OutsourcePilot
  </a>
  <div class="error-code">404</div>
  <h1>Page not found</h1>
  <p>The page you are looking for does not exist or has been moved. Head back to the homepage.</p>
  <a href="/" class="btn">Back to Homepage</a>
</body>
</html>
